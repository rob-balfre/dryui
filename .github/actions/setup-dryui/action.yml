name: Setup DryUI
description: Shared Bun + cache + install setup steps used by release, deploy, and validate workflows. Callers must run actions/checkout before using this composite action.
runs:
  using: composite
  steps:
    - uses: oven-sh/setup-bun@v2
      with:
        bun-version: 1.3.10
    - uses: actions/cache@v5
      with:
        path: ~/.bun/install/cache
        key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
        restore-keys: bun-${{ runner.os }}-
    - shell: bash
      run: bun install --frozen-lockfile
