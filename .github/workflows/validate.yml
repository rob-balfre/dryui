name: Validate

on:
  pull_request:
    branches: [main]

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    # Pin to 22.04 — ubuntu-24.04 has documented CI performance regressions
    # https://github.com/actions/runner-images/issues/11790
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v5
        with:
          # Full history so check:changeset can find the last
          # `chore: version packages` commit via `git log --grep`.
          fetch-depth: 0

      - uses: ./.github/actions/setup-dryui

      - run: bun run validate --no-test
        env:
          DRYUI_BASE_REF: origin/${{ github.base_ref }}
          DRYUI_PR_BODY: ${{ github.event.pull_request.body }}

      - run: bun --bun playwright install chromium

      - run: bun run test:browser

  coverage:
    # Pin to 22.04 — ubuntu-24.04 has documented CI performance regressions
    # https://github.com/actions/runner-images/issues/11790
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-dryui

      - run: bun --bun playwright install chromium

      - run: bun run test:coverage

      - run: bun run coverage:check

      - run: bun run coverage:matrix

      - name: Publish coverage summary
        if: always()
        continue-on-error: true
        run: |
          cat coverage/summary/coverage-summary.md >> "$GITHUB_STEP_SUMMARY"
          echo >> "$GITHUB_STEP_SUMMARY"
          sed -n '1,18p' reports/component-coverage-matrix.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ github.sha }}
          path: |
            coverage/summary
            coverage/unit
            coverage/browser
            reports/component-coverage-matrix.json
            reports/component-coverage-matrix.md
          if-no-files-found: ignore
          retention-days: 14
