name: Release

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # Never cancel a release in progress — a half-published release leaves
  # npm + git tags + GitHub Releases in an inconsistent state.
  cancel-in-progress: false

jobs:
  release:
    # Pin to 22.04 — ubuntu-24.04 has documented CI performance regressions
    # https://github.com/actions/runner-images/issues/11790
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    permissions:
      contents: write
    outputs:
      released_sha: ${{ steps.record.outputs.sha }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      PUBLIC_MAPBOX_TOKEN: ${{ secrets.PUBLIC_MAPBOX_TOKEN }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - uses: ./.github/actions/setup-dryui

      - run: bun run release:gate

      - run: bun run release:ci
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub releases for published tags
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mapfile -t tags < <(git tag --points-at HEAD)
          if [ "${#tags[@]}" -eq 0 ]; then
            echo "release: no published tags on HEAD, skipping GitHub Releases"
            exit 0
          fi

          for tag in "${tags[@]}"; do
            if gh release view "$tag" >/dev/null 2>&1; then
              echo "release: GitHub Release already exists for $tag"
              continue
            fi

            gh release create "$tag" --title "$tag" --generate-notes
          done

      - name: Record released SHA
        id: record
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  deploy-docs:
    needs: release
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    permissions:
      contents: read
    env:
      PUBLIC_MAPBOX_TOKEN: ${{ secrets.PUBLIC_MAPBOX_TOKEN }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout released SHA
        uses: actions/checkout@v5
        with:
          # Use the SHA after release:ci has potentially pushed a version commit,
          # so docs reference the just-published versions.
          ref: ${{ needs.release.outputs.released_sha }}
          fetch-depth: 1

      - name: Setup DryUI
        uses: ./.github/actions/setup-dryui

      - name: Build docs
        run: bun run build:docs

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/docs
          packageManager: bun
          command: pages deploy .svelte-kit/cloudflare --project-name=dryui-docs
