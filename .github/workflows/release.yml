name: Release

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # Never cancel a release in progress
  cancel-in-progress: false

jobs:
  release:
    # Pin to 22.04 — ubuntu-24.04 has documented CI performance regressions
    # https://github.com/actions/runner-images/issues/11790
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - run: bun install --frozen-lockfile

      - run: bun run build:packages

      - name: Debug NPM_TOKEN (length only, token value is masked)
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          echo "NPM_TOKEN length: ${#NPM_TOKEN}"
          echo "NPM_TOKEN prefix (first 4 chars): ${NPM_TOKEN:0:4}"
          echo "Tail byte hex dump (last 3 bytes):"
          printf '%s' "$NPM_TOKEN" | tail -c 3 | xxd || true
          # Directly test publish auth by hitting npm whoami with the token
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > /tmp/test-npmrc
          NPM_CONFIG_USERCONFIG=/tmp/test-npmrc npm whoami --registry=https://registry.npmjs.org || true
          rm /tmp/test-npmrc

      - uses: changesets/action@v1
        with:
          version: bun run version
          publish: bun run publish:packages
          title: 'chore: version packages'
          commit: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
