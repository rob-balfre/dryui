name: Release

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # Never cancel a release in progress
  cancel-in-progress: false

jobs:
  release:
    # Pin to 22.04 — ubuntu-24.04 has documented CI performance regressions
    # https://github.com/actions/runner-images/issues/11790
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      PUBLIC_MAPBOX_TOKEN: ${{ secrets.PUBLIC_MAPBOX_TOKEN }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - uses: ./.github/actions/setup-dryui

      - run: bun run release:gate

      - uses: changesets/action@v1
        with:
          version: bun run version
          publish: bun run publish:packages
          title: 'chore: version packages'
          commit: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
