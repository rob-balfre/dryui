name: Release

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # Never cancel a release in progress — a half-published release leaves
  # npm + git tags + GitHub Releases in an inconsistent state.
  cancel-in-progress: false

jobs:
  release:
    # Pin to 22.04 — ubuntu-24.04 has documented CI performance regressions
    # https://github.com/actions/runner-images/issues/11790
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      PUBLIC_MAPBOX_TOKEN: ${{ secrets.PUBLIC_MAPBOX_TOKEN }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - uses: ./.github/actions/setup-dryui

      # Phase 6 of the npx skills migration removed the legacy plugin-skills
      # and Cursor rules sync (sync:skills was deleted). The release pipeline
      # no longer needs a self-heal step for those generated artifacts. Set a
      # default-false drift flag so existing if-statements below stay correct.
      - name: Sync drift flag (no-op post-Phase-6)
        id: heal-sync
        run: echo "drift=false" >> "$GITHUB_OUTPUT"

      # Fail loudly if publishable packages changed since the last release
      # without a corresponding `.changeset/*.md`. We don't auto-generate
      # changesets from commits, so this is the only thing keeping a feature
      # wave from quietly skipping its npm publish.
      - name: Require changeset for unreleased package changes
        if: steps.heal-sync.outputs.drift != 'true'
        run: bun run scripts/check-changeset-required.ts

      - name: Release gate
        if: steps.heal-sync.outputs.drift != 'true'
        run: bun run release:gate

      # Belt-and-braces: before handing off to changeset publish, pack every
      # publishable package (with the same swap the publish flow uses) and
      # scan every tarball for unresolved workspace:* deps. We've shipped that
      # bug once (@dryui/mcp@2.0.0/2.0.1) — catching it here fails the release
      # loud instead of silently breaking every consumer post-publish.
      - name: Verify no workspace refs in tarballs
        if: steps.heal-sync.outputs.drift != 'true'
        run: bun run scripts/verify-no-workspace-refs.ts

      - name: Release CI
        if: steps.heal-sync.outputs.drift != 'true'
        run: bun run release:ci
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub releases for published tags
        if: steps.heal-sync.outputs.drift != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mapfile -t tags < <(git tag --points-at HEAD)
          if [ "${#tags[@]}" -eq 0 ]; then
            echo "release: no published tags on HEAD, skipping GitHub Releases"
            exit 0
          fi

          for tag in "${tags[@]}"; do
            if gh release view "$tag" >/dev/null 2>&1; then
              echo "release: GitHub Release already exists for $tag"
              continue
            fi

            gh release create "$tag" --title "$tag" --generate-notes
          done

      - name: Build docs
        if: steps.heal-sync.outputs.drift != 'true'
        # release:ci already rebuilt packages after any version bump, so the
        # docs build can reuse that dist output instead of rebuilding packages
        # in a second runner.
        run: bun run docs:build

      - name: Deploy to Cloudflare Pages
        if: steps.heal-sync.outputs.drift != 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/docs
          packageManager: bun
          # --branch=main is required because Actions checks out a detached SHA,
          # so wrangler would otherwise fall back to a "head" preview alias
          # instead of promoting to the dryui.dev production env.
          command: pages deploy build --project-name=dryui-docs --branch=main
