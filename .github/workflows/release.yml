name: Release

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # Never cancel a release in progress — a half-published release leaves
  # npm + git tags + GitHub Releases in an inconsistent state.
  cancel-in-progress: false

jobs:
  release:
    # Pin to 22.04 — ubuntu-24.04 has documented CI performance regressions
    # https://github.com/actions/runner-images/issues/11790
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    permissions:
      contents: write
    outputs:
      released_sha: ${{ steps.record.outputs.sha }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      PUBLIC_MAPBOX_TOKEN: ${{ secrets.PUBLIC_MAPBOX_TOKEN }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - uses: ./.github/actions/setup-dryui

      # `bun install` postinstall runs sync:skills, which regenerates
      # packages/plugin/skills/* and .cursor/rules/* from their sources in
      # packages/{ui,feedback,cli}/skills. If a commit landed on main with a
      # stale synced copy, the worktree is now dirty and release:ci would
      # refuse to run. Self-heal by committing the regenerated files; the
      # retriggered Release run will see a clean worktree and proceed.
      - name: Self-heal sync:skills drift
        id: heal-sync
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          STATUS=$(git status --porcelain)
          if [ -z "$STATUS" ]; then
            echo "drift=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Lines are like " M path", "?? path", "A  path". Drop the 3-char
          # status prefix and check paths against the sync target roots.
          NON_SYNC=$(echo "$STATUS" | awk '{print substr($0, 4)}' \
            | grep -vE '^(packages/plugin/skills/|\.cursor/rules/)' || true)
          if [ -n "$NON_SYNC" ]; then
            echo "sync-drift-check: worktree is dirty outside sync targets, not auto-healing"
            echo "$STATUS"
            exit 1
          fi

          echo "sync-drift-check: committing regenerated sync:skills output"
          echo "$STATUS"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/plugin/skills .cursor/rules
          git commit -m "chore: resync generated skills"
          git push origin HEAD:main
          echo "drift=true" >> "$GITHUB_OUTPUT"

      # If we pushed a resync commit, skip the rest of the release pipeline.
      # The resync push retriggers Release, which will run publish on a clean
      # worktree. Running publish here would race that retriggered run and
      # risk double-versioning when changesets are present.

      # Fail loudly if publishable packages changed since the last release
      # without a corresponding `.changeset/*.md`. We don't auto-generate
      # changesets from commits, so this is the only thing keeping a feature
      # wave from quietly skipping its npm publish.
      - name: Require changeset for unreleased package changes
        if: steps.heal-sync.outputs.drift != 'true'
        run: bun run scripts/check-changeset-required.ts

      - name: Release gate
        if: steps.heal-sync.outputs.drift != 'true'
        run: bun run release:gate

      # Belt-and-braces: before handing off to changeset publish, pack every
      # publishable package (with the same swap the publish flow uses) and
      # scan every tarball for unresolved workspace:* deps. We've shipped that
      # bug once (@dryui/mcp@2.0.0/2.0.1) — catching it here fails the release
      # loud instead of silently breaking every consumer post-publish.
      - name: Verify no workspace refs in tarballs
        if: steps.heal-sync.outputs.drift != 'true'
        run: bun run scripts/verify-no-workspace-refs.ts

      - name: Release CI
        if: steps.heal-sync.outputs.drift != 'true'
        run: bun run release:ci
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub releases for published tags
        if: steps.heal-sync.outputs.drift != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mapfile -t tags < <(git tag --points-at HEAD)
          if [ "${#tags[@]}" -eq 0 ]; then
            echo "release: no published tags on HEAD, skipping GitHub Releases"
            exit 0
          fi

          for tag in "${tags[@]}"; do
            if gh release view "$tag" >/dev/null 2>&1; then
              echo "release: GitHub Release already exists for $tag"
              continue
            fi

            gh release create "$tag" --title "$tag" --generate-notes
          done

      - name: Record released SHA
        id: record
        if: steps.heal-sync.outputs.drift != 'true'
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  deploy-docs:
    needs: release
    # Skip docs deploy when release exited early after a resync push — the
    # retriggered Release run will handle the deploy.
    if: needs.release.outputs.released_sha != ''
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    permissions:
      contents: read
    env:
      PUBLIC_MAPBOX_TOKEN: ${{ secrets.PUBLIC_MAPBOX_TOKEN }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout released SHA
        uses: actions/checkout@v5
        with:
          # Use the SHA after release:ci has potentially pushed a version commit,
          # so docs reference the just-published versions.
          ref: ${{ needs.release.outputs.released_sha }}
          fetch-depth: 1

      - name: Setup DryUI
        uses: ./.github/actions/setup-dryui

      - name: Build docs
        run: bun run build:docs

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/docs
          packageManager: bun
          # --branch=main is required: deploy-docs checks out a specific SHA, so
          # wrangler sees detached HEAD and otherwise falls back to a "head"
          # preview alias instead of promoting to the dryui.dev production env.
          command: pages deploy .svelte-kit/cloudflare --project-name=dryui-docs --branch=main
