name: Docs Visual

on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * *'

concurrency:
  group: docs-visual-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  docs-visual:
    # Pin to 22.04 — ubuntu-24.04 has documented CI performance regressions
    # https://github.com/actions/runner-images/issues/11790
    runs-on: ubuntu-22.04
    timeout-minutes: 25
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-dryui

      - run: bunx playwright install chromium

      - run: bun run test:docs-visual

      - name: Upload docs visual artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docs-visual-${{ github.sha }}
          path: |
            tests/playwright/test-results
            playwright-report
          if-no-files-found: ignore
          retention-days: 14
