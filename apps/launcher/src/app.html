<!doctype html>
<html lang="en" class="theme-auto">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<script>
			(() => {
				const root = document.documentElement;

				try {
					const storedTheme = window.localStorage.getItem('dryui-launcher-theme');
					const explicitTheme =
						storedTheme === 'light' || storedTheme === 'dark' ? storedTheme : null;

					if (!explicitTheme && storedTheme !== null) {
						window.localStorage.removeItem('dryui-launcher-theme');
					}

					root.classList.toggle('theme-auto', explicitTheme === null);

					if (explicitTheme) {
						root.dataset.theme = explicitTheme;
					} else {
						delete root.dataset.theme;
					}
				} catch {
					delete root.dataset.theme;
					root.classList.add('theme-auto');
				}
			})();
		</script>
		<link
			rel="icon"
			type="image/svg+xml"
			sizes="any"
			href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='16' fill='%230f172a'/><path d='M18 20h10c8 0 14 5.5 14 12s-6 12-14 12H24v8h-6V20zm6 6v12h3c4 0 8-2.5 8-6s-4-6-8-6h-3z' fill='%23f8fafc'/><path d='M41 20h6v24h-6z' fill='%2338bdf8'/></svg>"
		/>
		<title>DryUI Launcher</title>
		<meta
			name="description"
			content="Interactive startup tool for DryUI — connect your AI coding assistant."
		/>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div id="app">%sveltekit.body%</div>
	</body>
</html>
