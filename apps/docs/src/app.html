<!doctype html>
<html lang="en" class="theme-auto">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link rel="icon" href="%sveltekit.assets%/favicon.svg" />
		<script>
			(() => {
				const root = document.documentElement;
				const wizardStateStorageKey = 'dryui-theme-wizard';

				root.classList.add('no-transitions');

				try {
					const storedTheme = window.localStorage.getItem('dryui-docs-theme');
					const explicitTheme =
						storedTheme === 'light' || storedTheme === 'dark' ? storedTheme : null;

					if (!explicitTheme && storedTheme !== null) {
						window.localStorage.removeItem('dryui-docs-theme');
					}

					root.classList.toggle('theme-auto', explicitTheme === null);

					if (explicitTheme) {
						root.dataset.theme = explicitTheme;
					} else {
						delete root.dataset.theme;
					}

					if (!window.location.pathname.includes('/theme-wizard')) {
						return;
					}

					const storedWizardState = window.sessionStorage.getItem(wizardStateStorageKey);
					if (!storedWizardState) {
						return;
					}

					const parsedWizardState = JSON.parse(storedWizardState);
					const isDarkMode =
						explicitTheme === 'dark' ||
						(explicitTheme === null && window.matchMedia('(prefers-color-scheme: dark)').matches);
					const activeTokens = isDarkMode
						? parsedWizardState?.tokens?.dark
						: parsedWizardState?.tokens?.light;

					if (!activeTokens || typeof activeTokens !== 'object') {
						return;
					}

					for (const [property, value] of Object.entries(activeTokens)) {
						if (typeof value === 'string') {
							root.style.setProperty(property, value);
						}
					}
				} catch {
					// Ignore storage access issues and fall back to the browser preference.
					delete root.dataset.theme;
					root.classList.add('theme-auto');
				}
			})();
		</script>
		<title>dryui — Svelte 5 Component Library</title>
		<meta
			name="description"
			content="189 zero-dependency Svelte 5 components. Headless primitives, styled defaults, AI-ready MCP server, CLI, and project planning surfaces."
		/>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div id="app">%sveltekit.body%</div>
		<script>
			(() => {
				const root = document.documentElement;
				const isDark =
					root.dataset.theme === 'dark' ||
					(root.classList.contains('theme-auto') &&
						window.matchMedia('(prefers-color-scheme: dark)').matches);
				if (!isDark) return;
				for (const btn of document.querySelectorAll('button[data-theme-switch]')) {
					btn.setAttribute('aria-checked', 'true');
					btn.closest('[data-state]')?.setAttribute('data-state', 'on');
				}
			})();
		</script>
	</body>
</html>
