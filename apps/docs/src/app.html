<!doctype html>
<html lang="en" class="theme-auto">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link rel="icon" href="%sveltekit.assets%/favicon.svg" />
		<script>
			// Injected by hooks.server.ts via @dryui/ui `themeFlashScript('dryui-docs-theme')`.
			// Runs synchronously before any CSS loads to prevent a flash of the wrong theme.
			%dryui.themeFlash%
		</script>
		<title>DryUI — Svelte 5 Component Library</title>
		<meta
			name="description"
			content="189 zero-dependency Svelte 5 components. Headless primitives, styled defaults, AI-ready MCP server, CLI, and project planning surfaces."
		/>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div id="app">%sveltekit.body%</div>
		<script>
			(() => {
				const root = document.documentElement;
				const isDark =
					root.dataset.theme === 'dark' ||
					(root.classList.contains('theme-auto') &&
						window.matchMedia('(prefers-color-scheme: dark)').matches);
				if (!isDark) return;
				for (const btn of document.querySelectorAll('button[data-theme-switch]')) {
					btn.setAttribute('aria-checked', 'true');
					btn.closest('[data-state]')?.setAttribute('data-state', 'on');
				}
			})();
		</script>
	</body>
</html>
